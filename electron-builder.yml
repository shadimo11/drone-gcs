appId: com.marwan.drone-gcs
productName: Ground Control Station
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
# serialport ships native bindings; ensure they are unpacked from the asar.
asarUnpack:
  - "**/node_modules/@serialport/**"
  - "**/node_modules/serialport/**"
